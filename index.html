<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>องุ่นหวาน Studio⭐️</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --primary: #FCFFFF; 
  --secondary: #DCD2F5; 
  --bg-main: #EDE2FB; 
  --bg-card: #EADBFB; 
  --border-color: rgba(176,38,255,0.25);
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Kanit', sans-serif;
  background: var(--bg-main); color: #9872A3;
  overflow-x: hidden;
  padding-bottom: 110px; 
}

/* --- Particle & Glow Background --- */
.bg-glow-1 { position: fixed; top: -100px; left: -100px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(176,38,255,0.15) 0%, rgba(0,0,0,0) 70%); z-index: -1; pointer-events: none; }
.bg-glow-2 { position: fixed; bottom: 20%; right: -150px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,210,255,0.1) 0%, rgba(0,0,0,0) 70%); z-index: -1; pointer-events: none; }
#pts { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.pt { position: absolute; animation: ptUp linear infinite; opacity: 0; font-size: 12px; }
@keyframes ptUp {
  0%   { transform: translateY(105vh); opacity: 0; }
  10%  { opacity: 0.5; }
  90%  { opacity: 0.5; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* --- UI Layout --- */
.hero { background: linear-gradient(135deg, rgba(176,38,255,0.2) 0%, rgba(0,210,255,0.1) 100%); padding: 40px 20px 55px; text-align: center; position: relative; border-bottom: 1px solid var(--border-color); margin-bottom: 40px; }
.hero-title { font-family: 'Mitr', sans-serif; font-size: 32px; font-weight: 700; color: #fff; text-shadow: 0 0 15px rgba(176,38,255,0.4); }
.hero-detail { font-size: 13px; color: #9872A3; margin-top: 5px; opacity: 0.9; line-height: 1.4; }

.tab-container { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); display: flex; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 30px; padding: 4px; width: 260px; z-index: 10; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.tab-btn { flex: 1; padding: 8px 0; border-radius: 25px; border: none; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: #9872A3; transition: 0.3s; }
.tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }

.content { max-width: 600px; margin: 0 auto; padding: 0 20px 50px; position: relative; z-index: 5; }
.grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
.item-card { background: var(--bg-card); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 16px; cursor: pointer; display: flex; flex-direction: column; transition: 0.2s; }
.item-card.selected { border-color: var(--primary); background: linear-gradient(145deg, rgba(176,38,255,0.1) 0%, var(--bg-card) 100%); }
.card-icon { width: 100%; aspect-ratio: 1/1; border-radius: 12px; margin-bottom: 10px; object-fit: cover; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: #9872A3; }
.card-desc { font-size: 11px; color: #9872A3; opacity: 0.8; margin-bottom: 10px; line-height: 1.2; flex-grow: 1; }
.card-price { align-self: flex-start; background: rgba(152, 116, 162, 0.6); color: #fff; font-weight: 600; font-size: 13px; padding: 4px 10px; border-radius: 8px; }

/* หน้า Full Page (ดูเพิ่มเติม) */
#fullPageCategory { position: fixed; inset: 0; background: var(--bg-main); z-index: 3000; display: none; overflow-y: auto; padding: 20px 20px 120px; }
.back-btn { background: none; border: none; font-size: 28px; color: #9872A3; cursor: pointer; margin-bottom: 15px; }

/* Bottom Bar สีม่วงเข้ม #9774A2 */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #9774A2; border-top: 1px solid var(--primary); padding: 15px 24px; display: flex; justify-content: space-between; align-items: center; transform: translateY(100%); transition: 0.3s; z-index: 4000; }
.bottom-bar.active { transform: translateY(0); }
.bb-total { font-size: 20px; font-weight: 700; color: #fff; }
.bb-btn { background: linear-gradient(135deg, var(--primary), #d946ef); color: #fff; border: none; border-radius: 25px; padding: 10px 24px; font-weight: 600; cursor: pointer; }

/* Modal สรุปยอด */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; display: none; justify-content: center; align-items: center; }
.modal-box { background: var(--bg-card); border: 2px solid var(--primary); border-radius: 20px; width: 90%; max-width: 400px; padding: 24px; color: #9872A3; }
</style>
</head>
<body>

<div id="mainPage">
    <div class="bg-glow-1"></div><div class="bg-glow-2"></div><div id="pts"></div>
    <div class="hero">
      <div class="hero-title">องุ่นหวาน Studio💖</div>
      <div class="hero-detail">จำหน่ายฟอนต์ลายมือหลากหลายเครือ ราคาเริ่มต้นหลักสิบ ✨</div>
      
      <div class="tab-container">
        <button class="tab-btn active" id="btn-info" onclick="switchTab('info')">แนะนำ</button>
        <button class="tab-btn" id="btn-products" onclick="switchTab('products')">สินค้า</button>
      </div>
    </div>
    
    <div class="content">
      <div id="tab-info" style="display: block;">
        <div style="margin-bottom:15px; font-weight:700;">✨ แนะนำพิเศษ</div>
        <div class="grid-container" id="recommendGrid"></div>
      </div>
      <div id="tab-products" style="display: none;">
        <div id="productSections"></div>
      </div>
    </div>
</div>

<div id="fullPageCategory">
    <button class="back-btn" onclick="closeFullPage()">←</button>
    <h2 id="fullPageTitle" style="margin-bottom:20px; color:#9872A3;"></h2>
    <div class="grid-container" id="fullPageGrid"></div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div class="bb-info">
    <div id="cartCount" style="color:#fff; font-size:12px;">เลือก 0 รายการ</div>
    <div class="bb-total">฿<span id="cartTotal">0</span></div>
  </div>
  <button class="bb-btn" onclick="openSummary()">สั่งเลย ✨</button>
</div>

<div class="modal-overlay" id="summaryModal">
  <div class="modal-box">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; color:#fff;">
      <div style="font-weight:600;">🛒 รายการที่เลือก</div>
      <div onclick="closeSummary()" style="cursor:pointer; font-size:24px;">×</div>
    </div>
    <div id="modalItemsList" style="max-height:250px; overflow-y:auto; color:#fff;"></div>
    <div style="border-top:1px dashed #fff; margin:15px 0; padding-top:10px; display:flex; justify-content:space-between; color:#fff;">
      <span>ยอดชำระรวม:</span>
      <span style="font-size:20px; font-weight:700;">฿<span id="modalTotalPrice">0</span></span>
    </div>
    <button onclick="checkout()" style="width:100%; background:#00d300; border:none; color:#fff; padding:14px; border-radius:12px; font-weight:600; cursor:pointer;">💬 คัดลอก & สั่งผ่าน LINE</button>
  </div>
</div>
<script>
  // [จุดแก้ไขหลัก] ข้อมูลสินค้า (ชื่อ ราคา รายละเอียด รูปภาพ แยกชิ้นได้อิสระ)
  const categories = [
    { 

      id: 'cat1', 
      name: 'ฟอนต์เครือ GRP', 
      products: [
        { id: 'g1', name: 'มนตรา (GRP Mantra)', price: 89, detail: 'มี 3 น้ำหนัก (ปกติ/หนา/บาง)', img: 'https://s.imgz.io/2026/03/25/-49_20251015225114e22988d6bdb69391.png' },
        { id: 'g2', name: 'ไฮสคูล (GRP High School)', price: 129, detail: 'มี 3 น้ำหนัก (ปกติ/หนา/บาง)', img: 'https://s.imgz.io/2026/03/25/-49_20251015225114e22988d6bdb69391.png' },
        { id: 'g3', name: 'คุ๊กกี้ (GRP Cookie)', price: 39, detail: 'มี 3 น้ำหนัก (ปกติ/หนา/บาง)', img: 'https://s.imgz.io/2026/03/25/-49_20251015225114e22988d6bdb69391.png' },
        { id: 'g4', name: 'แคสเปอร์ (GRP Casper)', price: 99, detail: 'มีน้ำหนักเดียว มีเฉพาะตัวeng', img: 'https://s.imgz.io/2026/03/25/-49_20251015225114e22988d6bdb69391.png' },
        { id: 'g5', name: 'โยกเยก (GRP YokYek)', price: 89, detail: 'มี 3 น้ำหนัก (ปกติ/หนา/บาง)', img: 'https://s.imgz.io/2026/03/25/-49_20251015225114e22988d6bdb69391.png' },
        { id: 'g6', name: 'โมจิปัง (GRP MochiPung)', price: 59, detail: 'มี 3 น้ำหนัก (ปกติ/หนา/บาง)', img: 'https://drive.google.com/file/d/1aju7gXP1Pgo5AW-gMW0zWR0ICHcmcylR/view?usp=drivesdk' }

      ]
    },
    { 
      id: 'cat2', 
      name: 'ฟอนต์เครือ AM', 
      products: [
        { id: 'a1', name: 'เด็กเดค 01', price: 99, detail: 'เชิงพาณิชย์คุ้มๆ', img: 'https://s.imgz.io/2026/03/25/-49_20251015225114e22988d6bdb69391.png' },
        { id: 'a2', name: 'เด็กเดค วินเทจ', price: 129, detail: 'สไตล์ย้อนยุค', img: 'https://s.imgz.io/2026/03/25/-49_20251015225114e22988d6bdb69391.png' }
      ]
    },
    { 
      id: 'cat3', 
      name: 'ฟอนต์เครือ PRN', 
      products: [
        { id: 'p1', name: 'มันช์กิ้น (PRN Munchkin)', price: 49, detail: 'รวมชพณ.', img: 'https://img2.pic.in.th/3E6BC611-316E-4038-8DB7-3AA058B4B2B5.jpeg' },
        { id: 'p2', name: 'ซอฟท์คุกกี้ (PRN SoftCookie)', price: 69, detail: 'รวมชพณ.', img: 'https://img2.pic.in.th/7363B561-6330-4505-91B4-630C60590D78.jpeg' },
        { id: 'p3', name: 'ซัมเมอร์ (PRN Summer)', price: 59, detail: 'รวมชพณ.', img: 'https://img2.pic.in.th/86EEE341-AF29-4143-9FFD-29880598C2FB.jpeg' },
        { id: 'p4', name: 'บันนี่ (PRN Bunny)', price: 49, detail: 'รวมชพณ.', img: 'https://img1.pic.in.th/images/08374BAE-A61C-4771-8724-23240E1EDDAE.jpeg' },
        { id: 'p5', name: 'เชอร์รี่ (PRN Cherry)', price: 49, detail: 'รวมชพณ.', img: 'https://img2.pic.in.th/702A4A6A-59D1-4F06-982A-5685F0679540.jpeg' },
        { id: 'p6', name: 'สโนว์บอล (PRN SnowBall)', price: 39, detail: 'รวมชพณ.', img: 'https://img1.pic.in.th/images/3E886520-FE8D-4DA2-A27D-652D72172FA0.jpeg' },
        { id: 'p7', name: 'เดซี่ (PRN Daisy)', price: 45, detail: 'รวมชพณ.', img: 'https://img1.pic.in.th/images/1603A0C8-F19F-494B-BEF4-A3A7064A1F12.jpeg' },
        { id: 'p8', name: 'Puppy (PRN Puppy)', price: 65, detail: 'รวมชพณ.', img: 'https://img1.pic.in.th/images/AE0944CF-38F9-44F3-9A12-C8E36BE8F12F.jpeg' },
        { id: 'p9', name: 'หมีจิ๋ว (PRN Tiny Teddies)', price: 79, detail: 'รวมชพณ.', img: 'https://img2.pic.in.th/35A6312A-9300-4330-932A-778C8168D14D.jpeg' },
        { id: 'p10', name: 'สนามเด็กเล่น (PRN Playground)', price: 59, detail: 'รวมชพณ.', img: 'https://img1.pic.in.th/images/51F7BE76-1CD1-4741-98F4-0C8030A7DCC9.jpeg' },
        { id: 'p11', name: 'Chubby Cat (PRN Chubby Cat)', price: 59, detail: 'รวมชพณ.', img: 'https://img2.pic.in.th/3E1D1962-DDE5-40E8-A8EC-40540B672F3A.jpeg' },
        { id: 'p12', name: 'โคลเวอร์ (PRN Clover)', price: 75, detail: 'รวมชพณ.', img: 'https://https://img1.pic.in.th/images/FA57404D-FA08-43A8-8B82-7B73E3C6AA83.jpeg' }
      
      ]
    }
  ];

  let cart = [];

  // ระบบละอองดาว (Particle)
  const PtContainer = document.getElementById('pts');
  ['✦','★','✨','✧'].forEach(e => {
    for(let i=0; i<6; i++){
      const d = document.createElement('div');
      d.className='pt'; d.textContent=e;
      d.style.cssText=`left:${Math.random()*100}vw;color:#9872A3;animation-duration:${10+Math.random()*15}s;animation-delay:-${Math.random()*20}s;`;
      PtContainer.appendChild(d);
    }
  });

  function renderAll() {
    // แนะนำสินค้า (ดึงตัวแรกของแต่ละหมวด)
    document.getElementById('recommendGrid').innerHTML = categories.map(c => createCardHtml(c.products[0], c.name)).join('');
    
    // สินค้าหน้าหลัก (โชว์หมวดละ 4 ชิ้น)
    let html = '';
    categories.forEach(c => {
      const displayItems = c.products.slice(0, 4); // แสดงแค่ 4 รายการแรก
      html += `
        <div style="display:flex; justify-content:space-between; align-items:center; margin:25px 0 15px;">
          <h2 style="font-size:18px;">${c.name}</h2>
          <button style="background:none; border:1.px dashed #9872A3; color:#9872A3; padding:5px 12px; border-radius:10px; font-size:11px; cursor:pointer;" onclick="openFullPage('${c.id}')">ดูเพิ่มเติม</button>
        </div>
        <div class="grid-container">${displayItems.map(p => createCardHtml(p, c.name)).join('')}</div>
      `;
    });
    document.getElementById('productSections').innerHTML = html;
  }

  function createCardHtml(p, catName) {
    const isSel = cart.find(i => i.id === p.id) ? 'selected' : '';
    return `
      <div class="item-card ${isSel}" data-id="${p.id}" onclick="toggleItem('${p.id}','${catName}','${p.name}',${p.price},'${p.img}')">
        <img src="${p.img}" class="card-icon">
        <div class="card-title">${p.name}</div>
        <div class="card-desc">${p.detail}</div>
        <div class="card-price">฿${p.price}</div>
      </div>`;
  }

  function openFullPage(catId) {
    const cat = categories.find(c => c.id === catId);
    document.getElementById('fullPageTitle').innerText = cat.name;
    // แสดงสินค้า "ทั้งหมด" ในหมวดนั้น
    document.getElementById('fullPageGrid').innerHTML = cat.products.map(p => createCardHtml(p, cat.name)).join('');
    document.getElementById('mainPage').style.display = 'none';
    document.getElementById('fullPageCategory').style.display = 'block';
    window.scrollTo(0,0);
  }

  function closeFullPage() {
    document.getElementById('fullPageCategory').style.display = 'none';
    document.getElementById('mainPage').style.display = 'block';
  }

  function toggleItem(id, cat, name, price, img) {
    const idx = cart.findIndex(i => i.id === id);
    if(idx > -1) { cart.splice(idx, 1); } else { cart.push({id, cat, name, price, img}); }
    document.querySelectorAll(`[data-id="${id}"]`).forEach(el => el.classList.toggle('selected'));
    updateBottomBar();
  }

  function updateBottomBar() {
    const bar = document.getElementById('bottomBar');
    if (cart.length > 0) {
      bar.classList.add('active');
      document.getElementById('cartCount').innerText = `เลือก ${cart.length} รายการ`;
      document.getElementById('cartTotal').innerText = cart.reduce((s, i) => s + i.price, 0);
    } else { bar.classList.remove('active'); }
  }

  function switchTab(t) {
    document.getElementById('tab-info').style.display = t === 'info' ? 'block' : 'none';
    document.getElementById('tab-products').style.display = t === 'products' ? 'block' : 'none';
    document.getElementById('btn-info').classList.toggle('active', t==='info');
    document.getElementById('btn-products').classList.toggle('active', t==='products');
  }

  function openSummary() {
    let html = '';
    cart.forEach(i => { html += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>• ${i.name}</span><span>฿${i.price}</span></div>`; });
    document.getElementById('modalItemsList').innerHTML = html;
    document.getElementById('modalTotalPrice').innerText = cart.reduce((s, i) => s + i.price, 0);
    document.getElementById('summaryModal').style.display = 'flex';
  }

  function closeSummary() { document.getElementById('summaryModal').style.display = 'none'; }

  function checkout() {
    let text = "สรุปรายการสั่งซื้อ💖\n\n";
    cart.forEach(i => { text += `• ${i.cat}: ${i.name} (${i.price}.-)\n`; });
    text += `\nยอดรวม: ${cart.reduce((s, i) => s + i.price, 0)} บาท
    \n--------------------\nขอบคุณที่มาอุดหนุนร้านองุ่นนะคะ⭐️\nรอองุ่นตอบกลับภายใน 5-10 นาทีน้า✨`;
    const temp = document.createElement("textarea"); temp.value = text; document.body.appendChild(temp);
    temp.select(); document.execCommand("copy"); document.body.removeChild(temp);
    window.location.href = "https://lin.ee/vHRDLCC";
  }

  renderAll();
</script>
</body>
</html>
