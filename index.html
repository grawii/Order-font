<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>องุ่นหวาน Studio⭐️</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --pk: #ff80b5; --pk2: #ffb6d9; --pk3: #e8407a;
  --bg: #0a0510; --bg2: #12091d; --bg-card: #150a24;
  --txt2: rgba(255,255,255,0.7); --border-color: rgba(255,128,181,0.2);
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Kanit', sans-serif;
  background: var(--bg); color: #fff;
  overflow-x: hidden; padding-bottom: 110px;
}

/* --- Particles Background --- */
#pts { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.pt { position: absolute; animation: ptUp linear infinite; opacity: 0; }
@keyframes ptUp {
  0% { transform: translateY(105vh); opacity: 0; }
  8% { opacity: 0.45; }
  92% { opacity: 0.45; }
  100% { transform: translateY(-8vh) rotate(360deg); opacity: 0; }
}

/* --- Topbar & Hamburger --- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: #0f071a; border-bottom: 2px solid var(--pk3);
  box-shadow: 0 2px 20px rgba(232,64,122,0.3);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 56px;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.ham {
  width: 38px; height: 38px; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 5px; cursor: pointer; border-radius: 8px; border: 1.5px solid var(--pk);
  background: rgba(255,128,181,0.12); transition: 0.2s;
}
.ham span { display: block; width: 18px; height: 2.5px; background: #fff; border-radius: 2px; transition: 0.3s; }
.ham.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
.ham.open span:nth-child(2) { opacity: 0; }
.ham.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }
.topbar-brand { font-family: 'Mitr', sans-serif; font-size: 18px; font-weight: 700; color: #fff; text-shadow: 0 0 12px var(--pk); }

/* --- Drawer Menu --- */
.overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.6); display: none; }
.drawer {
  position: fixed; top: 0; left: 0; z-index: 201; width: 220px; height: 100vh;
  background: linear-gradient(180deg, #0f071a, #1a0d2e);
  border-right: 2px solid var(--pk3); transform: translateX(-100%); transition: 0.3s cubic-bezier(.4,0,.2,1);
  padding: 30px 0; display: flex; flex-direction: column; align-items: center;
}
.drawer.open { transform: translateX(0); }
.dr-av { width: 60px; height: 60px; border-radius: 50%; background: var(--pk); display: flex; align-items: center; justify-content: center; font-size: 25px; margin-bottom: 10px; box-shadow: 0 0 15px var(--pk); }
.dr-item { width: 100%; padding: 15px 25px; color: var(--txt2); text-decoration: none; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.dr-item:hover { background: rgba(255,128,181,0.1); color: #fff; }

/* --- Hero Section --- */
.hero {
  background: linear-gradient(135deg, #1e0838 0%, #8e2a60 100%);
  padding: 40px 20px 65px; text-align: center; position: relative;
}
.hero-title { font-family: 'Mitr', sans-serif; font-size: 32px; font-weight: 700; color: #fff; text-shadow: 0 0 20px var(--pk); }
.hero-detail { font-size: 13px; color: var(--pk2); margin-top: 5px; opacity: 0.8; letter-spacing: 0.5px; }

.tab-container {
  position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
  display: flex; background: var(--bg-card); border: 1.5px solid var(--pk);
  border-radius: 30px; padding: 4px; width: 260px; z-index: 10; box-shadow: 0 4px 20px rgba(232,64,122,0.3);
}
.tab-btn { flex: 1; padding: 8px 0; border-radius: 25px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: var(--pk2); }
.tab-btn.active { background: var(--pk); color: #fff; box-shadow: 0 0 10px var(--pk); }

/* --- Content & Cards --- */
.content { max-width: 600px; margin: 40px auto 0; padding: 0 20px; position: relative; z-index: 5; }
.sh { display: flex; align-items: center; gap: 10px; background: linear-gradient(90deg, #1e0838 0%, transparent 100%); border-left: 4px solid var(--pk); border-radius: 0 12px 12px 0; padding: 10px 15px; margin: 25px 0 15px; }
.sh h2 { font-size: 15px; font-weight: 700; color: #fff; }

.grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
.item-card { background: var(--bg-card); border: 1.5px solid rgba(255,128,181,0.12); border-radius: 16px; padding: 14px; cursor: pointer; display: flex; flex-direction: column; transition: 0.2s; }
.item-card.selected { border-color: var(--pk); background: rgba(255,128,181,0.1); box-shadow: 0 0 15px rgba(255,128,181,0.3); }
.card-icon { width: 100%; aspect-ratio: 1/1; border-radius: 12px; margin-bottom: 10px; object-fit: cover; border: 1px solid rgba(255,255,255,0.05); }
.card-title { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 4px; }
.card-desc { font-size: 11px; color: var(--txt2); opacity: 0.8; margin-bottom: 10px; line-height: 1.2; flex-grow: 1; }
.card-price { align-self: flex-start; background: linear-gradient(135deg, var(--pk), var(--pk3)); color: #fff; font-weight: 700; font-size: 12px; padding: 4px 10px; border-radius: 8px; box-shadow: 0 2px 8px rgba(232,64,122,0.4); }

/* --- Bottom Bar --- */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0f071a; border-top: 2px solid var(--pk3); padding: 15px 24px; display: flex; justify-content: space-between; align-items: center; transform: translateY(100%); transition: 0.3s; z-index: 4000; }
.bottom-bar.active { transform: translateY(0); }
.bb-total { font-size: 20px; font-weight: 700; color: var(--pk); text-shadow: 0 0 10px rgba(255,128,181,0.3); }
.bb-btn { background: var(--pk); color: #fff; border: none; border-radius: 25px; padding: 10px 24px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px var(--pk3); }

/* --- Modal & Fullpage --- */
#fullPageCategory { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; overflow-y: auto; padding: 20px 20px 120px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; display: none; justify-content: center; align-items: center; }
.modal-box { background: var(--bg-card); border: 2px solid var(--pk); border-radius: 20px; width: 92%; max-width: 400px; padding: 24px; }
</style>
</head>
<body>
<div id="pts"></div>
<div class="topbar">
  <div class="topbar-left">
    <div class="ham" id="hamBtn" onclick="toggleDrawer()">
      <span></span><span></span><span></span>
    </div>
    <span class="topbar-brand">องุ่นหวาน Studio💖</span>
  </div>
</div>

<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="dr-av">🍇</div>
  <div style="color:var(--pk); font-weight:700; font-size:12px; margin-bottom:20px; letter-spacing:1px;">ANGUNWAAN</div>
  <a href="#" class="dr-item" onclick="toggleDrawer(); switchTab('info')">🏠 หน้าแรก</a>
  <a href="#" class="dr-item" onclick="toggleDrawer(); switchTab('products')">🎨 สินค้าทั้งหมด</a>
  <a href="https://lin.ee/vHRDLCC" class="dr-item">💬 ติดต่อสอบถาม</a>
</div>

<div id="mainPage">
    <div class="hero">
      <div class="hero-title">องุ่นหวาน Studio💖</div>
      <div class="hero-detail">จำหน่ายฟอนต์ลายมือหลากหลายเครือ ราคาเริ่มต้นหลักสิบ ✨</div>
      <div class="tab-container">
        <button class="tab-btn active" id="btn-info" onclick="switchTab('info')">แนะนำ</button>
        <button class="tab-btn" id="btn-products" onclick="switchTab('products')">สินค้า</button>
      </div>
    </div>
    <div class="content">
      <div id="tab-info" style="display: block;">
        <div class="sh"><h2>✨ แนะนำพิเศษ</h2></div>
        <div class="grid-container" id="recommendGrid"></div>
      </div>
      <div id="tab-products" style="display: none;">
        <div id="productSections"></div>
      </div>
    </div>
</div>

<div id="fullPageCategory">
    <button style="background:none; border:none; color:var(--pk); font-size:30px; cursor:pointer;" onclick="closeFullPage()">←</button>
    <div class="sh"><h2 id="fullPageTitle"></h2></div>
    <div class="grid-container" id="fullPageGrid"></div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div class="bb-info">
    <div id="cartCount" style="color:var(--pk2); font-size:12px;">เลือก 0 รายการ</div>
    <div class="bb-total">฿<span id="cartTotal">0</span></div>
  </div>
  <button class="bb-btn" onclick="openSummary()">สั่งเลย ✨</button>
</div>

<div class="modal-overlay" id="summaryModal">
  <div class="modal-box">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; color:#fff;">
      <div style="font-weight:600; color:var(--pk2);">🛒 รายการที่เลือก</div>
      <div onclick="closeSummary()" style="cursor:pointer; font-size:24px;">×</div>
    </div>
    <div id="modalItemsList" style="max-height:250px; overflow-y:auto; color:var(--txt2); font-size:14px;"></div>
    <div id="promoNotice" style="color:var(--pk); font-size:12px; margin-top:10px; font-weight:bold;"></div>
    <div style="border-top:1px dashed var(--pk); margin:15px 0; padding-top:10px; display:flex; justify-content:space-between; color:#fff;">
      <span>ยอดชำระรวม:</span>
      <span style="font-size:20px; font-weight:700; color:var(--pk);">฿<span id="modalTotalPrice">0</span></span>
    </div>
    <button onclick="checkout()" style="width:100%; background:#00d300; border:none; color:#fff; padding:14px; border-radius:12px; font-weight:600; cursor:pointer; box-shadow: 0 4px 12px rgba(0,211,0,0.3);">💬 คัดลอก & สั่งผ่าน LINE</button>
  </div>
</div>

<script>
  // ข้อมูลเดิม 100%
  const categories = [
    { 
      id: 'cat1', 
      name: 'ฟอนต์เครือ GRP - ดึงเมลเอง🏅', 
      products: [
        { id: 'g1', name: 'มนตรา (GRP Mantra)', price: 89, detail: 'มี 3 น้ำหนัก (ปกติ/หนา/บาง)', isPromo: false, img: 'https://s.imgz.io/2026/03/25/-49_20251015225114e22988d6bdb69391.png' },
        { id: 'g2', name: 'ไฮสคูล (GRP High School)', price: 129, detail: 'มี 3 น้ำหนัก (ปกติ/หนา/บาง)', isPromo: false, img: 'https://s.imgz.io/2026/03/25/-49_20251015225114e22988d6bdb69391.png' },
        { id: 'g3', name: 'คุ๊กกี้ (GRP Cookie)', price: 39, detail: 'มี 3 น้ำหนัก (ปกติ/หนา/บาง)', isPromo: false, img: 'https://s.imgz.io/2026/03/25/-49_20251015225114e22988d6bdb69391.png' },
        { id: 'g4', name: 'แคสเปอร์ (GRP Casper)', price: 99, detail: 'มีน้ำหนักเดียว มีเฉพาะตัวeng', isPromo: false, img: 'https://s.imgz.io/2026/03/25/-49_20251015225114e22988d6bdb69391.png' }
      ]
    },
    { 
      id: 'cat2', 
      name: 'ฟอนต์เครือ AM', 
      products: [
        { id: 'a1', name: 'บัลเดอร์ (AM Balder)', price: 59, isPromo: true, detail: 'โปร 2 ฟอนต์ 100.-', img: 'https://img1.pic.in.th/images/06E02B71-90EC-4ABB-B1D5-B16D571E69A1.jpeg' },
        { id: 'a2', name: 'ซันเดย์ (AM Sunday)', price: 59, isPromo: true, detail: 'โปร 2 ฟอนต์ 100.-', img: 'https://img2.pic.in.th/D1E3E059-CE9D-4BB4-8D44-C0FEB86C1F30.jpeg' },
        { id: 'a3', name: 'เรนเจอร์ (AM Ranger)', price: 59, isPromo: true, detail: 'โปร 2 ฟอนต์ 100.-', img: 'https://img2.pic.in.th/CF5D39C1-27F2-40C7-A907-FFB7BAF60226.jpeg' },
        { id: 'a4', name: 'วินเทอร์ (AM Winter)', price: 59,  isPromo: true, detail: 'โปร 2 ฟอนต์ 100.-', img: 'https://img1.pic.in.th/images/1A872D06-44D6-42D9-A220-0FC54C97763B.jpeg' },
        { id: 'a5', name: 'เอสเม่ (AM Esme)', price: 59, isPromo: true, detail: 'โปร 2 ฟอนต์ 100.-', img: 'https://img2.pic.in.th/62E2B8DA-7760-4550-A250-8110984CE2FD.jpeg' },
        { id: 'a6', name: 'เทียนหอม (AM Tianhom)', price: 59, isPromo: true, detail: 'โปร 2 ฟอนต์ 100.-', img: 'https://img1.pic.in.th/images/2A111247-4E6E-44D7-85D7-529D69471666.jpeg' },
        { id: 'a7', name: 'โอลิเวีย (AM Olivia)', price: 59, isPromo: true, detail: 'โปร 2 ฟอนต์ 100.-', img: 'https://img2.pic.in.th/4B64ED71-2998-458E-9EDE-9C2962DDE825.jpeg' }
      ]
    },
    { 
      id: 'cat3', 
      name: 'ฟอนต์เครือ PRN', 
      products: [
        { id: 'p1', name: 'มันช์กิ้น (PRN Munchkin)', price: 49, detail: 'รวมชพณ.', img: 'https://img2.pic.in.th/3E6BC611-316E-4038-8DB7-3AA058B4B2B5.jpeg' },
        { id: 'p2', name: 'ซอฟท์คุกกี้ (PRN SoftCookie)', price: 69, detail: 'รวมชพณ.', img: 'https://img2.pic.in.th/7363B561-6330-4505-91B4-630C60590D78.jpeg' },
        { id: 'p3', name: 'ซัมเมอร์ (PRN Summer)', price: 59, detail: 'รวมชพณ.', img: 'https://img2.pic.in.th/86EEE341-AF29-4143-9FFD-29880598C2FB.jpeg' },
        { id: 'p4', name: 'บันนี่ (PRN Bunny)', price: 49, detail: 'รวมชพณ.', img: 'https://img1.pic.in.th/images/08374BAE-A61C-4771-8724-23240E1EDDAE.jpeg' },
        { id: 'p5', name: 'เชอร์รี่ (PRN Cherry)', price: 49, detail: 'รวมชพณ.', img: 'https://img2.pic.in.th/702A4A6A-59D1-4F06-982A-5685F0679540.jpeg' },
        { id: 'p6', name: 'สโนว์บอล (PRN SnowBall)', price: 39, detail: 'รวมชพณ.', img: 'https://img1.pic.in.th/images/3E886520-FE8D-4DA2-A27D-652D72172FA0.jpeg' },
        { id: 'p7', name: 'เดซี่ (PRN Daisy)', price: 45, detail: 'รวมชพณ.', img: 'https://img1.pic.in.th/images/1603A0C8-F19F-494B-BEF4-A3A7064A1F12.jpeg' },
        { id: 'p8', name: 'Puppy (PRN Puppy)', price: 65, detail: 'รวมชพณ.', img: 'https://img1.pic.in.th/images/AE0944CF-38F9-44F3-9A12-C8E36BE8F12F.jpeg' },
        { id: 'p9', name: 'หมีจิ๋ว (PRN Tiny Teddies)', price: 79, detail: 'รวมชพณ.', img: 'https://img2.pic.in.th/35A6312A-9300-4330-932A-778C8168D14D.jpeg' },
        { id: 'p10', name: 'สนามเด็กเล่น (PRN Playground)', price: 59, detail: 'รวมชพณ.', img: 'https://img1.pic.in.th/images/51F7BE76-1CD1-4741-98F4-0C8030A7DCC9.jpeg' },
        { id: 'p11', name: 'Chubby Cat (PRN Chubby Cat)', price: 59, detail: 'รวมชพณ.', img: 'https://img2.pic.in.th/3E1D1962-DDE5-40E8-A8EC-40540B672F3A.jpeg' },
        { id: 'p12', name: 'โคลเวอร์ (PRN Clover)', price: 75, detail: 'รวมชพณ.', img: 'https://img1.pic.in.th/images/FA57404D-FA08-43A8-8B82-7B73E3C6AA83.jpeg' }
      ]
    }
  ];

  let cart = [];

  function toggleDrawer() {
    const isOpen = document.getElementById('drawer').classList.toggle('open');
    document.getElementById('overlay').style.display = isOpen ? 'block' : 'none';
    document.getElementById('hamBtn').classList.toggle('open');
  }

  function calculateTotal() {
    let subtotal = cart.reduce((s, i) => s + i.price, 0);
    let promoCount = cart.filter(i => i.isPromo).length;
    let pairCount = Math.floor(promoCount / 2); 
    let discount = pairCount * 18;
    return { subtotal, total: subtotal - discount, discount };
  }

  function renderAll() {
    document.getElementById('recommendGrid').innerHTML = categories.map(c => createCardHtml(c.products[0], c.name)).join('');
    let html = '';
    categories.forEach(c => {
      html += `
        <div class="sh"><h2>${c.name}</h2> <button style="background:none; border:1px dashed var(--pk); color:var(--pk); padding:3px 8px; border-radius:8px; font-size:10px; cursor:pointer; margin-left:auto;" onclick="openFullPage('${c.id}')">ดูทั้งหมด</button></div>
        <div class="grid-container">${c.products.slice(0, 4).map(p => createCardHtml(p, c.name)).join('')}</div>
      `;
    });
    document.getElementById('productSections').innerHTML = html;
  }

  function createCardHtml(p, catName) {
    const isSel = cart.find(i => i.id === p.id) ? 'selected' : '';
    return `
      <div class="item-card ${isSel}" data-id="${p.id}" onclick="toggleItem('${p.id}','${catName}','${p.name}',${p.price},${p.isPromo || false})">
        <img src="${p.img}" class="card-icon">
        <div class="card-title">${p.name}</div>
        <div class="card-desc">${p.detail}</div>
        <div class="card-price">฿${p.price}</div>
      </div>`;
  }

  function toggleItem(id, cat, name, price, isPromo) {
    const idx = cart.findIndex(i => i.id === id);
    if(idx > -1) cart.splice(idx, 1); else cart.push({id, cat, name, price, isPromo});
    document.querySelectorAll(`[data-id="${id}"]`).forEach(el => el.classList.toggle('selected'));
    updateBottomBar();
  }

  function updateBottomBar() {
    const bar = document.getElementById('bottomBar');
    const res = calculateTotal();
    if (cart.length > 0) {
      bar.classList.add('active');
      document.getElementById('cartCount').innerText = `เลือก ${cart.length} รายการ`;
      document.getElementById('cartTotal').innerText = res.total;
    } else bar.classList.remove('active');
  }

  function switchTab(t) {
    document.getElementById('tab-info').style.display = t === 'info' ? 'block' : 'none';
    document.getElementById('tab-products').style.display = t === 'products' ? 'block' : 'none';
    document.getElementById('btn-info').classList.toggle('active', t==='info');
    document.getElementById('btn-products').classList.toggle('active', t==='products');
  }

  function openFullPage(catId) {
    const cat = categories.find(c => c.id === catId);
    document.getElementById('fullPageTitle').innerText = cat.name;
    document.getElementById('fullPageGrid').innerHTML = cat.products.map(p => createCardHtml(p, cat.name)).join('');
    document.getElementById('mainPage').style.display = 'none';
    document.getElementById('fullPageCategory').style.display = 'block';
    window.scrollTo(0,0);
  }

  function closeFullPage() {
    document.getElementById('fullPageCategory').style.display = 'none';
    document.getElementById('mainPage').style.display = 'block';
  }

  function openSummary() {
    let html = ''; const res = calculateTotal();
    cart.forEach(i => html += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>• ${i.name}</span><span>฿${i.price}</span></div>`);
    document.getElementById('modalItemsList').innerHTML = html;
    document.getElementById('promoNotice').innerText = res.discount > 0 ? `✨ ส่วนลดโปรโมชั่น AM: -฿${res.discount}` : '';
    document.getElementById('modalTotalPrice').innerText = res.total;
    document.getElementById('summaryModal').style.display = 'flex';
  }

  function closeSummary() { document.getElementById('summaryModal').style.display = 'none'; }

  function checkout() {
    const res = calculateTotal();
    let text = "สรุปรายการสั่งซื้อ💖\n\n" + cart.map(i => `• ${i.cat}: ${i.name} (${i.price}.-)`).join('\n');
    if(res.discount > 0) text += `\n\nส่วนลดโปรโมชั่น AM: -${res.discount} บาท`;
    text += `\nยอดสุทธิ: ${res.total} บาท\n--------------------\nขอบคุณที่มาอุดหนุนร้านองุ่นนะคะ⭐️`;
    const temp = document.createElement("textarea"); temp.value = text; document.body.appendChild(temp);
    temp.select(); document.execCommand("copy"); document.body.removeChild(temp);
    window.location.href = "https://lin.ee/vHRDLCC";
  }

  // Particle System สไตล์ PinkJulie
  const P = document.getElementById('pts');
  ['✦','★','♥','✿'].forEach(e => {
    for (let j = 0; j < 3; j++) {
      const d = document.createElement('div'); d.className = 'pt'; d.textContent = e;
      d.style.cssText = `left:${Math.random()*100}vw;font-size:${8+Math.random()*8}px;color:var(--pk);animation-duration:${10+Math.random()*13}s;animation-delay:${-Math.random()*25}s;`;
      P.appendChild(d);
    }
  });

  renderAll();
</script>
