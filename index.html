<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>องุ่นหวาน Studio⭐️</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --primary: #FCFFFF; 
  --secondary: #DCD2F5; 
  --bg-main: #EDE2FB; 
  --bg-card: #EADBFB; 
  --border-color: rgba(176,38,255,0.25);
  --text-muted: #9872A3;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Kanit', sans-serif;
  background: var(--bg-main); color: #9872A3;
  overflow-x: hidden; padding-bottom: 110px; 
}

/* Background Effects */
.bg-glow-1 { position: fixed; top: -100px; left: -100px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(176,38,255,0.15) 0%, rgba(0,0,0,0) 70%); z-index: -1; pointer-events: none; }
#pts { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.pt { position: absolute; animation: ptUp linear infinite; opacity: 0; }
@keyframes ptUp { 0% { transform: translateY(105vh); opacity: 0; } 100% { transform: translateY(-8vh) rotate(360deg); opacity: 0; } }

/* HERO & TABS */
.hero {
  background: linear-gradient(135deg, rgba(176,38,255,0.2) 0%, rgba(0,210,255,0.1) 100%);
  padding: 40px 20px 55px; text-align: center; position: relative; border-bottom: 1px solid var(--border-color); margin-bottom: 40px;
}
.hero-title { font-family: 'Mitr', sans-serif; font-size: 32px; font-weight: 700; color: #fff; text-shadow: 0 0 15px rgba(176,38,255,0.4); }
.hero-sub { font-size: 13px; color: #9872A3; }

.tab-container {
  position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
  display: flex; background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: 30px; padding: 4px; width: 260px; z-index: 10;
}
.tab-btn { flex: 1; padding: 8px 0; border-radius: 25px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: #9872A3; }
.tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }

/* CONTENT */
.content { max-width: 600px; margin: 0 auto; padding: 0 20px 50px; position: relative; z-index: 5; }
.tab-content { display: none; animation: fadeIn 0.3s ease; }
.tab-content.active { display: block; }

.sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.sh-left { display: flex; align-items: center; gap: 12px; }
.sh-line { width: 4px; height: 22px; background: linear-gradient(180deg, var(--primary), var(--secondary)); border-radius: 4px; }
.sh h2 { font-size: 18px; font-weight: 700; color: #9872A3; }

.btn-more { background: rgba(255,255,255,0.2); border: 1px solid var(--border-color); color: #9872A3; padding: 4px 12px; border-radius: 12px; font-size: 11px; cursor: pointer; }

/* CARDS */
.grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
.item-card { background: var(--bg-card); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 12px; position: relative; cursor: pointer; display: flex; flex-direction: column; }
.item-card.selected { border-color: var(--primary); background: linear-gradient(145deg, rgba(176,38,255,0.1) 0%, var(--bg-card) 100%); }
.card-icon { width: 100%; aspect-ratio: 1/1; border-radius: 12px; margin-bottom: 10px; object-fit: cover; }
.card-title { font-size: 14px; font-weight: 600; color: #9872A3; }
.card-price { align-self: flex-start; background: rgba(176,38,255,0.15); color: #e5a3ff; font-weight: 600; font-size: 13px; padding: 4px 10px; border-radius: 8px; margin-top: auto; }

/* FULL PAGE OVERLAY (แทนป๊อปอัพ) */
#fullPageCategory {
  position: fixed; inset: 0; background: var(--bg-main); z-index: 3000; display: none; overflow-y: auto; padding: 20px;
}

/* --- BOTTOM BAR & MODAL (ใช้โค้ดเดิม 100%) --- */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(18, 14, 38, 0.95); backdrop-filter: blur(15px); border-top: 1px solid var(--primary); padding: 15px 24px; display: flex; justify-content: space-between; align-items: center; transform: translateY(100%); transition: 0.3s; z-index: 1000; }
.bottom-bar.active { transform: translateY(0); }
.bb-total { font-size: 20px; font-weight: 700; color: #fff; }
.bb-btn { background: linear-gradient(135deg, var(--primary), #d946ef); color: #fff; border: none; border-radius: 25px; padding: 10px 24px; font-weight: 600; cursor: pointer; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; justify-content: center; align-items: center; }
.modal-box { background: var(--bg-card); border: 2px solid var(--primary); border-radius: 20px; width: 90%; max-width: 400px; padding: 24px; }
.modal-divider { border-top: 1px dashed rgba(176,38,255,0.4); margin: 15px 0; }
</style>
</head>
<body>
<div id="mainPage">
  <div class="bg-glow-1"></div><div id="pts"></div>
  <div class="hero">
    <div class="hero-title">องุ่นหวาน Studio💖</div>
    <div class="hero-sub">จำหน่ายฟอนต์ลายมือหลากหลายเครือ🪽</div>
    <div class="tab-container">
      <button class="tab-btn active" id="btn-info" onclick="switchTab('info')">แนะนำ</button>
      <button class="tab-btn" id="btn-products" onclick="switchTab('products')">สินค้า</button>
    </div>
  </div>
  <div class="content">
    <div id="tab-info" class="tab-content active"><div class="sh"><div class="sh-left"><div class="sh-line"></div><h2>แนะนำพิเศษ</h2></div></div><div class="grid-container" id="recommendGrid"></div></div>
    <div id="tab-products" class="tab-content"><div id="productSections"></div></div>
  </div>
</div>

<div id="fullPageCategory">
  <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
    <button onclick="closeFullPage()" style="background:none; border:none; font-size:24px; color:#9872A3; cursor:pointer;">←</button>
    <h2 id="fullPageTitle" style="color:#9872A3;">ชื่อหมวดหมู่</h2>
  </div>
  <div class="grid-container" id="fullPageGrid"></div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div class="bb-info"><div class="bb-count" id="cartCount">เลือก 0 รายการ</div><div class="bb-total"><span>฿</span><span id="cartTotal">0</span></div></div>
  <button class="bb-btn" onclick="openSummary()">สั่งเลย ✨</button>
</div>

<div class="modal-overlay" id="summaryModal">
  <div class="modal-box">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <div style="font-weight:600; color:#fff;">🛒 สรุปรายการสั่งซื้อ</div>
      <div onclick="closeSummary()" style="cursor:pointer; color:#9872A3; font-size:24px;">×</div>
    </div>
    <div id="modalItemsList" style="max-height:250px; overflow-y:auto;"></div>
    <div class="modal-divider"></div>
    <div style="display:flex; justify-content:space-between; align-items:center; font-weight:600; color:#fff;">
      <span>ยอดที่ต้องชำระ:</span>
      <span style="font-size:24px; color:var(--primary);">฿<span id="modalTotalPrice">0</span></span>
    </div>
    <button onclick="checkout()" style="width:100%; background:#00d300; border:none; color:#fff; padding:14px; border-radius:12px; margin-top:20px; font-weight:600; cursor:pointer;">💬 คัดลอก & สั่งผ่าน LINE</button>
  </div>
</div>
<script>
  // Particles (คงเดิม)
  const P = document.getElementById('pts');
  ['✦','★','✨'].forEach(e => {
    for (let j = 0; j < 4; j++) {
      const d = document.createElement('div'); d.className = 'pt'; d.textContent = e;
      d.style.cssText = `left:${Math.random()*100}vw;font-size:12px;color:#9872A3;animation-duration:15s;animation-delay:-${Math.random()*20}s;`;
      P.appendChild(d);
    }
  });

  const categories = [
    { id: 'cat1', name: 'ฟอนต์เครือ GRP', price: 89, images: ['https://s.imgz.io/2026/03/25/-49_20251015225114e22988d6bdb69391.png'] },
    { id: 'cat2', name: 'ฟอนต์เครือ DEKDEC', price: 99, images: ['https://s.imgz.io/2026/03/25/-49_20251015225114e22988d6bdb69391.png'] }
  ];

  let cart = [];

  function createCardHtml(p) {
    const isSel = cart.find(i => i.id === p.id) ? 'selected' : '';
    return `
      <div class="item-card ${isSel}" data-id="${p.id}" onclick="toggleItem('${p.id}','${p.cat}','${p.name}',${p.price},'${p.icon}')">
        <img src="${p.icon}" class="card-icon">
        <div class="card-title">${p.name}</div>
        <div class="card-price">฿${p.price}</div>
      </div>`;
  }

  function renderAll() {
    document.getElementById('recommendGrid').innerHTML = categories.map(c => createCardHtml({id:c.id+'-1', cat:c.name, name:c.name+' #1', price:c.price, icon:c.images[0]})).join('');
    document.getElementById('productSections').innerHTML = categories.map(c => `
      <div class="cat-divider" style="display:flex; justify-content:space-between; margin:20px 0;">
        <span style="font-weight:600;">${c.name}</span>
        <button class="btn-more" onclick="openFullPage('${c.id}')">ดูเพิ่มเติม (500 รายการ)</button>
      </div>
      <div class="grid-container">${createCardHtml({id:c.id+'-1', cat:c.name, name:c.name+' #1', price:c.price, icon:c.images[0]})}</div>
    `).join('');
  }

  // ระบบหน้าใหม่ (Full Overlay)
  function openFullPage(catId) {
    const cat = categories.find(c => c.id === catId);
    document.getElementById('fullPageTitle').innerText = cat.name;
    let html = '';
    for(let i=1; i<=500; i++) {
        html += createCardHtml({id:`${catId}-${i}`, cat:cat.name, name:`${cat.name} #${i}`, price:cat.price, icon:cat.images[0]});
    }
    document.getElementById('fullPageGrid').innerHTML = html;
    document.getElementById('mainPage').style.display = 'none';
    document.getElementById('fullPageCategory').style.display = 'block';
    window.scrollTo(0,0);
  }

  function closeFullPage() {
    document.getElementById('fullPageCategory').style.display = 'none';
    document.getElementById('mainPage').style.display = 'block';
  }

  function toggleItem(id, cat, name, price, icon) {
    const idx = cart.findIndex(i => i.id === id);
    if(idx > -1) { cart.splice(idx, 1); } else { cart.push({id, cat, name, price}); }
    document.querySelectorAll(`[data-id="${id}"]`).forEach(el => el.classList.toggle('selected'));
    updateBottomBar();
  }

  function updateBottomBar() {
    const bar = document.getElementById('bottomBar');
    if (cart.length > 0) {
      bar.classList.add('active');
      document.getElementById('cartCount').innerText = `เลือก ${cart.length} รายการ`;
      document.getElementById('cartTotal').innerText = cart.reduce((s, i) => s + i.price, 0);
    } else { bar.classList.remove('active'); }
  }

  function switchTab(t) {
    document.getElementById('btn-info').classList.toggle('active', t==='info');
    document.getElementById('btn-products').classList.toggle('active', t==='products');
    document.getElementById('tab-info').classList.toggle('active', t==='info');
    document.getElementById('tab-products').classList.toggle('active', t==='products');
  }

  // --- ระบบสรุปยอดดั้งเดิม ---
  function openSummary() {
    let html = ''; let total = 0;
    cart.forEach(item => {
      html += `<div style="display:flex; justify-content:space-between; color:#fff; margin-bottom:10px; font-size:14px;">
        <span>• ${item.name}</span><span>฿${item.price}</span>
      </div>`;
      total += item.price;
    });
    document.getElementById('modalItemsList').innerHTML = html;
    document.getElementById('modalTotalPrice').innerText = total;
    document.getElementById('summaryModal').style.display = 'flex';
  }

  function closeSummary() { document.getElementById('summaryModal').style.display = 'none'; }

  function checkout() {
    let total = 0;
    let text = "สรุปรายการสั่งซื้อ\n\n";
    cart.forEach(item => {
      text += `สินค้า: ${item.cat} - ${item.name}\nราคา: ${item.price} บาท\n\n`;
      total += item.price;
    });
    text += `--------------------\nยอดที่ต้องชำระทั้งหมด: ${total} บาท\n\nขอบคุณที่ไว้วางใจค่ะ`;
    const temp = document.createElement("textarea"); temp.value = text; document.body.appendChild(temp);
    temp.select(); document.execCommand("copy"); document.body.removeChild(temp);
    window.location.href = "https://lin.ee/vHRDLCC";
  }

  renderAll();
</script>
</body>
</html>
